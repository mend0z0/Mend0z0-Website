<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

:root{
    --primary:#1aa38f;
    --dark:#2f3445;
    --light:#f5f7f8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--light);
    color:var(--dark);
}

/* HEADER */

header{
    background:white;
    padding:40px 20px;
    text-align:center;
    border-bottom:3px solid var(--primary);
}

header h1{
    font-size:32px;
    color:var(--dark);
}

header p{
    margin-top:10px;
    color:#666;
}

/* CONTACT SECTION */

.contact-container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

/* CONTACT INFO */

.contact-info{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.contact-info h2{
    margin-bottom:20px;
}

.contact-info p{
    margin-bottom:15px;
}

/* FORM / GOOGLE FORM EMBED */

.contact-form{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.contact-form h2{
    margin-bottom:20px;
}

.form-container{
    width:100%;
    border-radius:10px;
    overflow:hidden;
}

/* RESPONSIVE */

@media(max-width:800px){

.contact-container{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
<p>We’d love to hear from you</p>
</header>


<section class="contact-container">

<div class="contact-info">
<h2>Get in Touch</h2>

<p><strong>Email</strong><br>
contact@yourdomain.com</p>

<p><strong>Phone</strong><br>
+1 234 567 890</p>

<p><strong>Address</strong><br>
Your Company Name<br>
City, Country</p>

<p>
Send us a message using the form and we'll respond as soon as possible.
</p>

</div>


<div class="contact-form">

<h2>Send a Message</h2>

<div class="form-container">

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSdTZYlsAm6NorLHpQJOJNXRM3gxQzJDcY62Jr5JjNC9yflpKA/viewform?embedded=true"
width="100%"
height="800"
frameborder="0"
marginheight="0"
marginwidth="0">
Loading…
</iframe>

</div>

</div>

</section>

</body>
</html>
