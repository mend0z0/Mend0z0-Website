<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Showcase</title>

<style>

:root{
--primary:#109e92;
--dark:#30334a;
}

body{
font-family:'Segoe UI',Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.header img{
width:80px;
margin-bottom:10px;
}

.header h1{
margin:0;
color:var(--dark);
}

/* PRODUCT CONTAINER */

.container{
max-width:900px;
margin:40px auto;
background:white;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
overflow:hidden;
}

.product{
display:flex;
flex-wrap:wrap;
}

/* CAROUSEL */

.carousel{
position:relative;
width:100%;
max-width:400px;
overflow:hidden;
}

.slides{
display:flex;
transition:transform 0.4s ease;
}

.slides img{
width:400px;
height:400px;
object-fit:cover;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
font-size:22px;
padding:10px 14px;
cursor:pointer;
border-radius:6px;
}

.arrow:hover{
background:rgba(0,0,0,0.6);
}

.prev{left:10px;}
.next{right:10px;}

/* DOTS */

.dots{
text-align:center;
position:absolute;
bottom:10px;
width:100%;
}

.dot{
display:inline-block;
width:10px;
height:10px;
margin:5px;
background:#ccc;
border-radius:50%;
cursor:pointer;
}

.dot.active{
background:var(--primary);
}

/* PRODUCT DETAILS */

.details{
padding:25px;
flex:1;
}

h1{
margin-top:0;
color:var(--dark);
}

.price{
font-size:28px;
color:var(--primary);
font-weight:bold;
margin:15px 0;
}

.features{
margin:20px 0;
}

.features li{
margin-bottom:8px;
}

.buy-btn{
display:inline-block;
padding:14px 28px;
background:var(--primary);
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.buy-btn:hover{
background:#0d7c72;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h1>MENDOZO Services</h1>
</div>

<div class="container">
<div class="product">

<!-- CAROUSEL -->
<div class="carousel">

<div class="slides" id="slides">

<img src="https://via.placeholder.com/400x400?text=Product+1">
<img src="https://via.placeholder.com/400x400?text=Product+2">
<img src="https://via.placeholder.com/400x400?text=Product+3">

</div>

<button class="arrow prev" onclick="prevSlide()">❮</button>
<button class="arrow next" onclick="nextSlide()">❯</button>

<div class="dots" id="dots"></div>

</div>

<!-- DETAILS -->
<div class="details">

<h1>Smart Wireless Earbuds</h1>

<p>
High-quality Bluetooth earbuds with noise cancellation, long battery life, and crystal-clear sound.
Perfect for music, calls, and workouts.
</p>

<div class="price">$79.99</div>

<ul class="features">
<li>Bluetooth 5.3</li>
<li>Noise Cancellation</li>
<li>24 Hour Battery</li>
<li>USB-C Fast Charging</li>
</ul>

<a class="buy-btn" href="#">Buy Now</a>

</div>

</div>
</div>

<script>

let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;
const dotsContainer = document.getElementById("dots");

for(let i=0;i<total;i++){
let d = document.createElement("span");
d.className="dot";
d.onclick=()=>goToSlide(i);
dotsContainer.appendChild(d);
}

function updateCarousel(){
slides.style.transform = "translateX(-"+index*400+"px)";
document.querySelectorAll(".dot").forEach((dot,i)=>{
dot.classList.toggle("active", i===index);
});
}

function nextSlide(){
index = (index+1)%total;
updateCarousel();
}

function prevSlide(){
index = (index-1+total)%total;
updateCarousel();
}

function goToSlide(i){
index = i;
updateCarousel();
}

setInterval(nextSlide,4000);
updateCarousel();

</script>

</body>
</html>
