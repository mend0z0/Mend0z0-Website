<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAV & Drones Services</title>

<style>

:root{
--primary:#109e92;
--dark:#30334a;
--light:#f5f7fb;
}

body{
font-family:'Segoe UI',Arial,sans-serif;
margin:0;
background:var(--light);
color:var(--dark);
}

/* TITLE SECTION */

.header{
background:white;
padding:40px 20px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.header h1{
margin:0;
font-size:34px;
color:var(--dark);
}

/* CONTAINER */

.wrapper{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

/* PRODUCTS GRID */

.products{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center; /* center cards horizontally */
}

/* PRODUCT CARD */

.card{
flex:1;
min-width:240px;
max-width:300px;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 18px 35px rgba(0,0,0,0.12);
}

/* IMAGE */

.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* CONTENT */

.card-content{
padding:22px;
text-align:center; /* center text */
display:flex;
flex-direction:column;
align-items:center;
}

.card h3{
margin:0;
font-size:19px;
}

.price{
color:var(--primary);
font-weight:700;
margin:12px 0 18px 0;
}

/* BUTTON */

.btn{
display:inline-block;
padding:12px 24px;
background:var(--primary);
color:white;
text-decoration:none;
border-radius:30px;
font-weight:600;
transition:0.2s;
}

.btn:hover{
background:#0c7f75;
}

</style>
</head>

<body>

<div class="header">
<h1>UAV & Drones Services</h1>
</div>

<div class="wrapper">

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="card-content">
<h3>Rentals</h3>
<div class="price">MX$369</div>
<a class="btn" href="#">View Details</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="card-content">
<h3>Custom Build</h3>
<div class="price">MX$89</div>
<a class="btn" href="#">View Details</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="card-content">
<h3>Repair & Maintanance</h3>
<div class="price">MX$99</div>
<a class="btn" href="#">View Details</a>
</div>
</div>

</div>

</div>

</body>
</html>
